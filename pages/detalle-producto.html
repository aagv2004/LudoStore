<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle de producto | LudoStore</title>
    <link rel="icon" type="image/svg+xml" href="../ludostore-logo.svg" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link rel="stylesheet" href="../styles/styles.css" />
  </head>
  <body>
    <header class="navbar" id="home">
      <a href="../index.html" class="navbar-logo">
        <img src="../ludostore-logo.svg" alt="LudoStore" />
      </a>

      <nav class="navbar-menu">
        <div class="submenu">
          <button class="submenu-boton" type="button">
            Juegos <span>▼</span>
          </button>

          <div class="submenu-contenido">
            <a href="categorias/familiares.html">Familiares</a>
            <a href="categorias/estrategias.html">Estrategia</a>
            <a href="categorias/cartas.html">Cartas</a>
            <a href="categorias/cooperativos.html">Cooperativos</a>
          </div>
        </div>

        <a href="../index.html">Inicio</a>
        <a href="registro-membresia.html">Registrarse</a>
      </nav>
    </header>

    <main>
      <section class="detalle-producto" id="detalleProducto">
        <div class="detalle-imagen">
          <img src="" alt="" id="productoImagen" />
        </div>

        <article class="detalle-info">
          <p class="detalle-categoria" id="productoCategoria"></p>
          <h2 id="productoNombre"></h2>
          <p class="detalle-descripcion" id="productoDescripcion"></p>

          <div class="detalle-meta">
            <span id="productoJugadores"></span>
            <span id="productoEdad"></span>
            <span id="productoDuracion"></span>
          </div>

          <div class="detalle-precio">
            <span id="productoPrecio"></span>
            <small id="productoDescuento"></small>
          </div>

          <p class="detalle-stock" id="productoStock"></p>

          <div class="detalle-cantidad">
            <label for="cantidadProducto">Cantidad</label>
            <input id="cantidadProducto" type="number" min="1" value="1" />
          </div>

          <div class="detalle-acciones">
            <button class="btn-ludostore" id="btnAgregarCarrito" type="button">
              Agregar al carrito
            </button>

            <a
              id="btnVolverCatalogo"
              href="categorias/cartas.html"
              class="btn-outline-ludostore">
              Volver al catálogo
            </a>
          </div>

          <p class="detalle-mensaje" id="mensajeProducto"></p>
        </article>
      </section>
    </main>

    <footer>
      <p>LudoStore - Catálogo de juegos de mesa</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/navbar.js"></script>
    <script src="../scripts/productos.js"></script>
    <script src="../scripts/detalle-producto.js"></script>
  </body>
</html>
